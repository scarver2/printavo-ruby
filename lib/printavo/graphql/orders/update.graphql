mutation QuoteUpdate($id: ID!, $input: QuoteInput!) {
  quoteUpdate(id: $id, input: $input) {
    id
    visualId
    nickname
    total
    createdAt
    updatedAt
    status {
      id
      name
      color
    }
    customer {
      id
      firstName
      lastName
      email
      company
    }
  }
}
