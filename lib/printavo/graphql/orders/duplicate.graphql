mutation QuoteDuplicate($id: ID!) {
  quoteDuplicate(id: $id) {
    id
    visualId
    nickname
    productionNote
    dueAt
    customerDueAt
    totalPrice
    contact {
      id
      firstName
      lastName
      email
    }
    status {
      id
      name
      color
    }
    createdAt
    updatedAt
  }
}
