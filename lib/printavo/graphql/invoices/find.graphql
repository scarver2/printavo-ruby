query Invoice($id: ID!) {
  invoice(id: $id) {
    id
    visualId
    nickname
    total
    amountPaid
    amountOutstanding
    paidInFull
    invoiceAt
    paymentDueAt
    createdAt
    updatedAt
    status {
      id
      name
      color
    }
    contact {
      id
      firstName
      lastName
      email
      phone
    }
  }
}
