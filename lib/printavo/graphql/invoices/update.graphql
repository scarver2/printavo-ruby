mutation InvoiceUpdate($id: ID!, $input: InvoiceInput!) {
  invoiceUpdate(id: $id, input: $input) {
    id
    visualId
    nickname
    total
    amountPaid
    amountOutstanding
    paidInFull
    invoiceAt
    paymentDueAt
    createdAt
    updatedAt
    status {
      id
      name
      color
    }
    contact {
      id
      firstName
      lastName
      email
      phone
    }
  }
}
